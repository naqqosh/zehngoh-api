name: Image Build and Push

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - run: |
          docker build \
          -t ${{ vars.USER_API_IMAGE_NAME }}:latest \
          -t ${{ vars.USER_API_IMAGE_NAME }}:${{ github.sha }} \
          ./

      - run: |
          docker push ${{ vars.USER_API_IMAGE_NAME }}:latest
          docker push ${{ vars.USER_API_IMAGE_NAME }}:${{ github.sha }}

      - run: echo "Image pushed successfully"
